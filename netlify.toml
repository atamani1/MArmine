[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # Force function rebuild

[[redirects]]
  from = "/api/telegram"
  to = "/.netlify/functions/telegram"
  status = 200

[[redirects]]
  from = "/api/rsvps"
  to = "/.netlify/functions/rsvps"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
