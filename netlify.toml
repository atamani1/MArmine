[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/telegram"
  to = "/.netlify/functions/telegram"
  status = 200

[[redirects]]
  from = "/api/rsvp"
  to = "/.netlify/functions/rsvp"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
